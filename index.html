<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkflowOS</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="sidebar">

        <h2>WorkflowOS</h2>

        <ul>
            <li class="active">Dashboard</li>
            <li>Tasks</li>
            <li>Analytics</li>
            <li>Settings</li>
        </ul>

    </div>

    <div class="main">

        <div class="topbar">

            <div>
                <h1>Workflow Dashboard</h1>
                <p>Manage your daily productivity</p>
            </div>

            <button class="dark-btn" onclick="toggleDarkMode()" id="themeBtn">
                Light Mode
            </button>

        </div>

        <div class="cards">

            <div class="card">
                <h3>Total Tasks</h3>
                <p id="totalTasks">0</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p id="completedTasks">0</p>
            </div>

            <div class="card">
                <h3>Productivity</h3>
                <p id="productivity">0%</p>
            </div>

            <div class="card">
                <h3>Overdue</h3>
                <p id="overdueTasks">0</p>
            </div>

        </div>

        <div class="task-box">

            <div class="task-header">
                <div>
                    <h2>Task List</h2>
                    <p>Add, filter, edit, and track your work.</p>
                </div>
                <button class="clear-btn" onclick="clearCompletedTasks()">Clear Completed</button>
            </div>

            <div class="progress-wrap">
                <div class="progress-label">
                    <span>Progress</span>
                    <span id="progressText">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill"></div>
                </div>
            </div>

            <div class="task-form">

                <input type="text" id="taskInput" placeholder="Add new task...">

                <select id="priorityInput">
                    <option value="High">High</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="Low">Low</option>
                </select>

                <select id="categoryInput">
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Meeting">Meeting</option>
                    <option value="Study">Study</option>
                </select>

                <input type="date" id="dueDateInput">

                <button onclick="addTask()" id="addTaskBtn">Add Task</button>

            </div>

            <div class="filters">
                <input type="text" id="searchInput" placeholder="Search tasks..." oninput="renderTasks()">

                <select id="statusFilter" onchange="renderTasks()">
                    <option value="All">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Completed">Completed</option>
                    <option value="Overdue">Overdue</option>
                </select>

                <select id="priorityFilter" onchange="renderTasks()">
                    <option value="All">All Priority</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>

                <select id="sortInput" onchange="renderTasks()">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="priority">Priority</option>
                    <option value="dueDate">Due Date</option>
                </select>
            </div>

            <ul id="taskList"></ul>
            <p id="emptyState" class="empty-state">No tasks found.</p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
